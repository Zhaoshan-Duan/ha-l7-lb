# Load balancer configuration.
# Backend endpoints use AWS Cloud Map service-discovery DNS.
# The redis.addr field is overridden at runtime by the REDIS_ADDR
# environment variable injected via the ECS task definition.

load_balancer:
  port: 8080
  timeout: 5s
  # retries_enabled: false disables retry on idempotent method failures.
  # Overridden at runtime by RETRIES_ENABLED env var (ECS task definition)
  # for Experiment 2's retries-disabled variant.
  retries_enabled: true

route:
  # Changeable per experiment: round-robin | least-connections | weighted
  # Experiment 1 weighted-hetero: 70/30 split between strong and weak tiers.
  policy: "weighted"
  backends:
    - endpoint: "http://api-strong.internal:8080"
      weight: 70
    - endpoint: "http://api-weak.internal:8080"
      weight: 30

health_check:
  interval: 10s
  timeout: 5s

redis:
  addr: "redis:6379"
  password: ""
  db: 0